/*
 * gradle/publish.gradle
 *
 * Maven-publish логика:
 *   assembleArtifact — собирает финальный ZIP дистрибутива
 *   publishAll       — одна кнопка: pullLibsBundle → createDist → ZIP → publish
 *
 * Зависит от переменных, объявленных в nexus.gradle (они exposed через ext).
 */

// ── Credentials / repo URLs ────────────────────────────────────────────────────
def snapshotsRepoUrl = project.findProperty('snapshotsRepoUrl') ?: ''
def releasesRepoUrl  = project.findProperty('releasesRepoUrl')  ?: ''
def mavenUsername    = project.findProperty('mavenUsername')    ?: ''
def mavenPassword    = project.findProperty('mavenPassword')    ?: ''

def MVN_USER = System.getenv('MVN_USER') ?: mavenUsername
def MVN_PASS = System.getenv('MVN_PASS') ?: mavenPassword

// ── Artifact metadata ─────────────────────────────────────────────────────────
def artifactId      = 'nt_master'
def artifactVersion = (project.findProperty('version') ?: project.findProperty('appversion') ?: '1.0.0') as String
def urlSite         = artifactVersion.endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl

// ── assembleArtifact ──────────────────────────────────────────────────────────
tasks.register('assembleArtifact', Zip) {
    group       = 'release'
    description = 'Собирает финальный ZIP дистрибутива для публикации в Maven Nexus'
    dependsOn   'pullLibsBundle', 'createDist'

    archiveBaseName         = artifactId
    archiveVersion          = artifactVersion
    destinationDirectory    = layout.buildDirectory.dir('distr')

    from(rootProject.rootDir) {
        include 'bin/**'
        include 'lib/**'
        include 'extras/**'
    }
}

// ── publishing ────────────────────────────────────────────────────────────────
group = 'ru.nt_master'

publishing {
    publications {
        maven(MavenPublication) {
            groupId    = 'ru.nt_master'
            artifactId = artifactId
            version    = artifactVersion
            artifact tasks.named('assembleArtifact')
        }
    }
    repositories {
        maven {
            url = uri(urlSite)
            credentials {
                username = MVN_USER
                password = MVN_PASS
            }
        }
    }
}

// ── publishAll — одна кнопка для разработчика ─────────────────────────────────
tasks.register('publishAll') {
    group       = 'release'
    description = 'pullLibsBundle → createDist → assembleArtifact → publish'
    dependsOn   'assembleArtifact', 'publish'
}
