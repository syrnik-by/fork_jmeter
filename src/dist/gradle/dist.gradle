/*
 * gradle/dist.gradle
 *
 * Сборка дистрибутива:
 *   populateLibs      — разложить JAR по CopySpec-ам (lib/, lib/ext/, bin/)
 *   copyLibs          — Sync lib/
 *   copyBinLibs       — Copy bin/
 *   createDist        — lifecycle: dependsOn copyLibs + copyBinLibs
 *   assembleArtifact  — финальная сборка продукта: ZIP для публикации в Nexus Maven
 *   distZip / distTar — архивы дистрибутива для пользователей
 *
 * Зависит от переменных, объявленных в build.gradle через ext:
 *   pluginAliases, jars    — списки
 *   lib(alias)             — замыкание из version catalog
 *   CrLfSpecClass, LineEndingsClass
 * Зависит от конфигураций:
 *   runtimeClasspath, pluginClasspath, generatorJar, binLicense
 */

import org.gradle.api.artifacts.component.ProjectComponentIdentifier

// ── Читаем ext-значения на уровне скрипта (до tasks.register) ──────────────────────
// Зачем: doLast{} выполняется в контексте таска, а не проекта.
// project.ext там недоступен напрямую — нужно захватить в local val здесь.
def _pluginAliases      = project.ext.pluginAliases   as List<String>
def _jars               = project.ext.jars            as List<String>
def _lib                = project.ext.lib             // Closure: alias -> MinimalExternalModuleDependency
def _LineEndingsClass   = project.ext.LineEndingsClass
def _CrLfSpecClass      = project.ext.CrLfSpecClass

// module-id множество всех плагинов (предвычисляем здесь, пока catalog доступен)
def _pluginModuleIds = _pluginAliases.collect { alias ->
    def d = _lib(alias)
    "${d.module.group}:${d.module.name}"
}.toSet()

// пути субпроектов (project path) — тоже захватываем заранее
def _launcherPath   = project(':src:launcher').path
def _bshclientPath  = project(':src:bshclient').path
def _jorphanPath    = ':src:jorphan'

// ── CopySpecs (lib/ | lib/ext/ | bin/) ────────────────────────────────────────
ext.libsSpec = copySpec()
ext.libsExt  = copySpec()
ext.binLibs  = copySpec()

// ── populateLibs ─────────────────────────────────────────────────────────────────────
def populateLibs = tasks.register('populateLibs') {
    dependsOn configurations.runtimeClasspath
    // захватываем заранее вычисленные значения
    def pluginModuleIds    = _pluginModuleIds
    def launcherProject    = _launcherPath
    def bshclientProject   = _bshclientPath
    def jorphanProject     = _jorphanPath
    def libsSpecRef        = libsSpec
    def libsExtRef         = libsExt
    def binLibsRef         = binLibs
    def runtimeCfg         = configurations.runtimeClasspath
    def pluginCfg          = configurations.pluginClasspath

    doLast {
        def pluginIds = pluginCfg
            .resolvedConfiguration.resolvedArtifacts
            .collect { "${it.moduleVersion.id.group}:${it.moduleVersion.id.name}" }
            .toSet()

        runtimeCfg.get().resolvedConfiguration.resolvedArtifacts.each { dep ->
            def compId = dep.id.componentIdentifier
            if (!(compId instanceof ProjectComponentIdentifier) || !compId.build.isCurrentBuild()) {
                def moduleId = "${dep.moduleVersion.id.group}:${dep.moduleVersion.id.name}"
                if (moduleId in pluginIds) libsExtRef.from(dep.file)
                else                       libsSpecRef.from(dep.file)
                return
            }
            def target
            switch (compId.projectPath) {
                case launcherProject:   target = binLibsRef;  break
                case jorphanProject:
                case bshclientProject:  target = libsSpecRef; break
                default:                target = libsExtRef;  break
            }
            target.from(dep.file) { rename { dep.name + '.' + dep.extension } }
        }

        pluginCfg.resolvedConfiguration.resolvedArtifacts.each { dep ->
            def compId   = dep.id.componentIdentifier
            def moduleId = "${dep.moduleVersion.id.group}:${dep.moduleVersion.id.name}"
            if (moduleId in pluginIds && (!(compId instanceof ProjectComponentIdentifier) || !compId.build.isCurrentBuild())) {
                libsExtRef.from(dep.file)
            } else if (!(moduleId in pluginIds)) {
                libsSpecRef.from(dep.file)
            }
        }
    }
}

libsSpec.from(populateLibs)
libsExt.from(populateLibs)
binLibs.from(populateLibs)

// ── copyLibs / copyBinLibs ────────────────────────────────────────────────────
def copyLibs = tasks.register('copyLibs', Sync) {
    rootSpec.into("${rootDir}/lib")
    with libsSpec
    preserve {
        include '**/*.txt'
        include 'ext/*.jar'
        exclude 'ext/ApacheJMeter*.jar'
    }
    into('ext') {
        with libsExt
        from(files(configurations.generatorJar)) {
            rename { 'ApacheJMeter_generator.jar' }
        }
    }
}

def copyBinLibs = tasks.register('copyBinLibs', Copy) {
    rootSpec.into("${rootDir}/bin")
    with binLibs
}

// ── createDist ────────────────────────────────────────────────────────────────
tasks.register('createDist') {
    group       = LifecycleBasePlugin.BUILD_GROUP
    description = 'Собирает fork JAR и раскладывает их в lib/ и bin/'
    dependsOn copyLibs, copyBinLibs
}

// ── assembleArtifact — финальная сборка продукта ─────────────────────────────
def artifactId      = project.findProperty('artifactId')      ?: 'nt_master'
def artifactVersion = (project.findProperty('version') ?: project.findProperty('appversion') ?: '1.0.0') as String

tasks.register('assembleArtifact', Zip) {
    group       = 'release'
    description = 'Финальная сборка продукта: ZIP дистрибутива для публикации в Nexus Maven'
    dependsOn   'pullLibsBundle', 'createDist'

    archiveBaseName         = artifactId
    archiveVersion          = artifactVersion
    destinationDirectory    = layout.buildDirectory.dir('distr')

    from(rootProject.rootDir) {
        include 'bin/**'
        include 'lib/**'
        include 'extras/**'
    }
}

// ── Docs helpers ─────────────────────────────────────────────────────────────
def xdocs = "${rootDir}/xdocs"

def docCssAndImages = { spec ->
    spec.from(xdocs) {
        include '.htaccess'
        include 'css/**'
        include 'images/**'
    }
}

def printableDocumentation = { spec ->
    spec.into('docs') { docCssAndImages(delegate) }
}

def excludeLicenseFromSourceRelease = { spec ->
    spec.exclude 'licenses/**'
    spec.exclude 'LICENSE'
}

def baseFolder = "apache-jmeter-${rootProject.version}"

def javadocAggregate = tasks.register('javadocAggregate', Javadoc) {
    group       = JavaBasePlugin.DOCUMENTATION_GROUP
    description = 'Генерирует агрегированный Javadoc для всех fork-модулей'
    def sourceSetsSnap = _jars.collect { project(it).sourceSets.main }
    classpath      = files(sourceSetsSnap.collect { ss -> ss.collect { it.output + it.compileClasspath } })
    source(sourceSetsSnap.collect { ss -> ss.collect { it.allJava } })
    destinationDir = file("${buildDir}/docs/javadocAggregate")
}

def javadocsSpec = copySpec { from(javadocAggregate) }

// binaryLayout — plain Gradle CopySpec, никаких CrLfSpec extension-методов не вызывается
def binaryLayout = { eol ->
    def spec = project.copySpec()
    spec.into(baseFolder) {
        from files(configurations.binLicense)
        from(rootDir) {
            exclude 'bin/testfiles'
            exclude 'bin/rmi_keystore.jks'
            include 'bin/**'
            include 'lib/ext/**'
            include 'lib/junit/**'
            include 'extras/**'
            include 'README.md'
            excludeLicenseFromSourceRelease(delegate)
        }
        into('bin') { with binLibs }
        into('lib') {
            with libsSpec
            into('ext') { with libsExt }
        }
        printableDocumentation(delegate)
        into('docs/api') { with javadocsSpec }
    }
    spec
}

// ── skipDist guard ───────────────────────────────────────────────────────────
def skipDist = {
    def extProps = rootProject.extensions.extraProperties
    if (extProps.has('skipDist')) return extProps.get('skipDist') as boolean
    def prop = rootProject.findProperty('skipDist')
    if (prop == null) return false
    return !(prop as String).equalsIgnoreCase('false')
}()

// ── distZip / distTar ────────────────────────────────────────────────────────────────
if (!skipDist) {
    def LF   = _LineEndingsClass.getField('LF').get(null)
    def CRLF = _LineEndingsClass.getField('CRLF').get(null)

    ['binary', 'source'].each { type ->
        [Zip, Tar].each { archiveClass ->
            def taskName = "dist${archiveClass.simpleName}${type == 'binary' ? '' : type.capitalize()}"
            tasks.register(taskName, archiveClass) {
                dependsOn createDist
                group       = 'distribution'
                description = "Создаёт $type дистрибутив"
                if (it instanceof Tar) compression = Compression.GZIP
                archiveBaseName = "apache-jmeter-${rootProject.version}${type == 'source' ? '_src' : ''}"
                archiveVersion  = ''
                with binaryLayout(type == 'binary' ? LF : CRLF)
            }
        }
    }
}
